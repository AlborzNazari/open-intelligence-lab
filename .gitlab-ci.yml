# ─────────────────────────────────────────────────────────────────────────────
# Open Intelligence Lab — GitLab CI/CD Pipeline v0.6.0
#
# Stages: validate → test → build → security → deploy
# 10 jobs. Runs on GitLab SaaS shared runners.
# Deploy requires FLY_API_TOKEN CI/CD variable to be set in GitLab project settings.
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - validate
  - test
  - build
  - security
  - deploy

variables:
  IMAGE_NAME: open-intelligence-lab
  IMAGE_TAG: $CI_COMMIT_SHA
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR"

# ── Shared caching config ─────────────────────────────────────────────────────
.python_cache: &python_cache
  cache:
    key:
      files:
        - requirements.txt
        - requirements-dev.txt
    paths:
      - .cache/pip
      - venv/

# ── Shared Python base ────────────────────────────────────────────────────────
.python_base: &python_base
  image: python:3.12-slim
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip --quiet
    - pip install -r requirements.txt -r requirements-dev.txt --quiet
  <<: *python_cache

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — VALIDATE
# ─────────────────────────────────────────────────────────────────────────────

lint:
  stage: validate
  <<: *python_base
  script:
    - black --check --diff api/ backend/ core_engine/ || true
    - isort --check-only --diff api/ backend/ core_engine/ || true
    - flake8 api/ backend/ core_engine/ --max-line-length=120 --ignore=E501,W503,E203,E226,W391,F841
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

schema_validate:
  stage: validate
  <<: *python_base
  script:
    # validate_schemas.py resolves paths from project root — no cwd dependency
    - python scripts/validate_schemas.py
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — TEST
# ─────────────────────────────────────────────────────────────────────────────

unit_tests:
  stage: test
  <<: *python_base
  script:
    - pytest tests/
        --cov=api
        --cov=core_engine
        --cov-report=term-missing
        --cov-report=xml:coverage.xml
        --junitxml=junit.xml
        -v
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - junit.xml
      - coverage.xml
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

api_smoke_test:
  stage: test
  <<: *python_base
  script:
    # Start server in background; smoke_test.py has its own retry loop
    - uvicorn api.main:app --host 0.0.0.0 --port 8000 &
    - python scripts/smoke_test.py
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — BUILD
# ─────────────────────────────────────────────────────────────────────────────

build_docker:
  stage: build
  image: docker:26.1
  services:
    - docker:26.1-dind
  variables:
    FULL_IMAGE: $CI_REGISTRY_IMAGE/$IMAGE_NAME
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - >
      docker build
      --build-arg VERSION=v0.6.0
      --build-arg GIT_SHA=$CI_COMMIT_SHA
      --cache-from $FULL_IMAGE:latest
      -t $FULL_IMAGE:$IMAGE_TAG
      -t $FULL_IMAGE:latest
      .
    - docker push $FULL_IMAGE:$IMAGE_TAG
    - docker push $FULL_IMAGE:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

tag_release:
  stage: build
  image: alpine:latest
  script:
    - echo "IMAGE_TAG=$IMAGE_TAG" >> build.env
    - echo "VERSION=v0.6.0" >> build.env
    - echo "BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> build.env
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - build.env
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4 — SECURITY
# ─────────────────────────────────────────────────────────────────────────────

dependency_scan:
  stage: security
  <<: *python_base
  script:
    - pip-audit --requirement requirements.txt || true
    - safety check --file requirements.txt || true
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

container_scan:
  stage: security
  image: docker:26.1
  services:
    - docker:26.1-dind
  variables:
    FULL_IMAGE: $CI_REGISTRY_IMAGE/$IMAGE_NAME
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table $FULL_IMAGE:$IMAGE_TAG
  allow_failure: true
  needs:
    - build_docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 5 — DEPLOY
# ─────────────────────────────────────────────────────────────────────────────

deploy_production:
  stage: deploy
  image: alpine:latest
  when: manual
  needs:
    - unit_tests
    - build_docker
    - dependency_scan
  before_script:
    - apk add --no-cache curl
    # Install flyctl
    - curl -L https://fly.io/install.sh | sh
    - export PATH="$HOME/.fly/bin:$PATH"
    - flyctl version
  script:
    - flyctl deploy --remote-only --app open-intelligence-lab-cyrmjw
  environment:
    name: production
    url: https://open-intelligence-lab-cyrmjw.fly.dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      # Requires FLY_API_TOKEN to be set in GitLab project Settings → CI/CD → Variables

rollback_production:
  stage: deploy
  image: alpine:latest
  when: manual
  before_script:
    - apk add --no-cache curl
    - curl -L https://fly.io/install.sh | sh
    - export PATH="$HOME/.fly/bin:$PATH"
  script:
    # Set ROLLBACK_SHA as a CI variable or pass it as an override
    - >
      if [ -z "$ROLLBACK_SHA" ]; then
        echo "ERROR: Set ROLLBACK_SHA variable to the target image tag before running rollback."
        exit 1
      fi
    - flyctl deploy --image $CI_REGISTRY_IMAGE/$IMAGE_NAME:$ROLLBACK_SHA --app open-intelligence-lab-cyrmjw
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
