stages:
  - validate
  - test
  - build
  - security
  - deploy

variables:
  IMAGE_NAME: open-intelligence-lab
  IMAGE_TAG: $CI_COMMIT_SHA
  FLY_APP_NAME: open-intelligence-lab
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.python_cache: &python_cache
  cache:
    key:
      files:
        - requirements.txt
    paths:
      - .cache/pip
      - venv/

.python_base: &python_base
  image: python:3.12-slim
  before_script:
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
  <<: *python_cache

lint:
  stage: validate
  <<: *python_base
  script:
    - pip install flake8 black isort
    - black --check --diff api/ backend/ || true
    - isort --check-only --diff api/ backend/ || true
    - flake8 api/ backend/ --max-line-length=120 --ignore=E501,W503
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

schema_validate:
  stage: validate
  <<: *python_base
  script:
    - pip install stix2 jsonschema
    - python scripts/validate_schemas.py
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

unit_tests:
  stage: test
  <<: *python_base
  script:
    - pip install pytest pytest-cov pytest-asyncio httpx
    - pytest tests/ --cov=api --cov=backend --cov-report=term-missing --junitxml=junit.xml -v
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - junit.xml
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

api_smoke_test:
  stage: test
  <<: *python_base
  script:
    - pip install httpx
    - export PYTHONPATH=$PWD
    - python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
    - sleep 5
    - python scripts/smoke_test.py
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

build_docker:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    FULL_IMAGE: $CI_REGISTRY_IMAGE/$IMAGE_NAME
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --build-arg VERSION=v0.5.0 --build-arg GIT_SHA=$CI_COMMIT_SHA -t $FULL_IMAGE:$IMAGE_TAG -t $FULL_IMAGE:latest .
    - docker push $FULL_IMAGE:$IMAGE_TAG
    - docker push $FULL_IMAGE:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

tag_release:
  stage: build
  image: alpine:latest
  script:
    - echo "IMAGE_TAG=$IMAGE_TAG" >> build.env
    - echo "VERSION=v0.5.0" >> build.env
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env
    paths:
      - build.env
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

dependency_scan:
  stage: security
  <<: *python_base
  script:
    - pip install safety pip-audit
    - pip-audit --requirement requirements.txt || true
    - safety check --file requirements.txt || true
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

container_scan:
  stage: security
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    FULL_IMAGE: $CI_REGISTRY_IMAGE/$IMAGE_NAME
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table $FULL_IMAGE:$IMAGE_TAG
  allow_failure: true
  needs:
    - build_docker
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy_production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://$FLY_APP_NAME.fly.dev
  when: manual
  before_script:
    - apk add --no-cache curl
    - curl -L https://fly.io/install.sh | sh
    - export PATH="$HOME/.fly/bin:$PATH"
    - flyctl auth token $FLY_API_TOKEN
  script:
    - export PATH="$HOME/.fly/bin:$PATH"
    - flyctl deploy --app $FLY_APP_NAME --image $CI_REGISTRY_IMAGE/$IMAGE_NAME:$IMAGE_TAG --strategy rolling --wait-timeout 180
    - sleep 15
    - curl -sf https://$FLY_APP_NAME.fly.dev/health || exit 1
  needs:
    - build_docker
    - unit_tests
    - dependency_scan
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

rollback_production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://$FLY_APP_NAME.fly.dev
  when: manual
  before_script:
    - apk add --no-cache curl
    - curl -L https://fly.io/install.sh | sh
    - export PATH="$HOME/.fly/bin:$PATH"
    - flyctl auth token $FLY_API_TOKEN
  script:
    - export PATH="$HOME/.fly/bin:$PATH"
    - flyctl deploy --app $FLY_APP_NAME --image $CI_REGISTRY_IMAGE/$IMAGE_NAME:$ROLLBACK_SHA --strategy immediate --wait-timeout 120
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'