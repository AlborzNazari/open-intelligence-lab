# ─────────────────────────────────────────────────────────────────────────────
# Open Intelligence Lab — GitHub Actions CI v0.6.0
#
# Jobs:
#   test  — pytest suite with coverage, runs on every push and PR
#   pages — deploys index.html to GitHub Pages on push to main
# ─────────────────────────────────────────────────────────────────────────────

name: CI + Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate dataset JSON
        run: python scripts/validate_schemas.py

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ \
            --cov=api \
            --cov=core_engine \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit.xml \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            junit.xml
            coverage.xml
          retention-days: 30

  # ── GitHub Pages Deploy ─────────────────────────────────────────────────────
  deploy:
    name: Deploy Pages
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
