# ─────────────────────────────────────────────────────────────────────────────
# Open Intelligence Lab — Docker Compose
# v0.4.0
#
# Spins up three services:
#   1. misp        — Full MISP instance (threat intel platform)
#   2. oilab       — Open Intelligence Lab API
#   3. caddy       — HTTPS reverse proxy (fixes mixed-content block)
#
# QUICK START:
#   docker compose up
#
# Then:
#   - Visual Lab:     open index.html in your browser
#                     set API URL to https://localhost:8443
#   - OI Lab API:     http://localhost:8000  (direct, HTTP)
#   - OI Lab HTTPS:   https://localhost:8443 (via Caddy — use this for GitHub Pages)
#   - OI Lab Docs:    https://localhost:8443/docs
#   - MISP UI:        https://localhost  (login: admin@admin.test / admin)
#
# WHY CADDY?
#   GitHub Pages serves index.html over https://
#   Your local API runs over http://
#   Browsers block https → http requests (mixed content)
#   Caddy wraps the API in HTTPS so both sides match — block gone.
#
# FIRST TIME SETUP:
#   1. Run: docker compose up
#   2. Open https://localhost:8443 in your browser
#   3. Accept the self-signed cert warning (click Advanced → Proceed)
#      This unlocks the cert for all subsequent requests from index.html
#   4. Open index.html, set API URL to https://localhost:8443
#   5. Done — graph loads, no mixed content errors
#
# TO ACTIVATE LIVE MISP FEED:
#   1. Open https://localhost → login → My Profile → Auth key → copy it
#   2. Add to .env file: MISP_KEY=your-copied-key
#   3. Restart: docker compose up
#
# Author: Alborz Nazari
# License: MIT
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MISP ────────────────────────────────────────────────────────────────────
  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: oilab-misp
    ports:
      - "80:80"
      - "443:443"
    environment:
      - MISP_BASEURL=https://localhost
      - MISP_ADMIN_EMAIL=admin@admin.test
      - MISP_ADMIN_PASSPHRASE=admin
      - MISP_ORG=Open Intelligence Lab
    volumes:
      - misp_data:/var/www/MISP/app/files
      - misp_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost/users/login"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ── Open Intelligence Lab API ────────────────────────────────────────────────
  oilab:
    build: .
    container_name: oilab-api
    ports:
      - "8000:8000"
    environment:
      - MISP_URL=https://misp
      - MISP_KEY=${MISP_KEY:-}
      - MISP_LABEL=MISP-Local
      - MISP_VERIFY_SSL=false
      - MISP_PULL_DAYS=7
      - MISP_LIMIT=200
      - MISP_INTERVAL_SECONDS=3600
    depends_on:
      misp:
        condition: service_healthy
    restart: unless-stopped

  # ── Caddy HTTPS Proxy ────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: oilab-caddy
    ports:
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - oilab
    restart: unless-stopped

volumes:
  misp_data:
  misp_db:
  caddy_data:
  caddy_config:
